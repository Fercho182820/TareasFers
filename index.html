<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Tareas FES">
  <meta name="theme-color" content="#f5f0e8">
  <title>Tareas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── HEADER ── -->
  <header>
    <div class="header-top">
      <span class="app-title">FERS</span>
      <span class="header-count" id="headerCount">0 tareas</span>
    </div>
    <div class="search-bar">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Buscar tarea o materia…">
    </div>
    <div class="filter-tabs">
      <button class="filter-tab active" data-filter="Todas">Todas</button>
      <button class="filter-tab" data-filter="Pendiente">Pendientes</button>
      <button class="filter-tab" data-filter="En_Proceso">En proceso</button>
      <button class="filter-tab" data-filter="Completado">Listas</button>
    </div>
  </header>

  <!-- ── STATS ── -->
  <div class="stats-row">
    <div class="stat-card pendiente">
      <div class="stat-label">Pendientes</div>
      <div class="stat-value" id="statPendiente">0</div>
    </div>
    <div class="stat-card proceso">
      <div class="stat-label">En proceso</div>
      <div class="stat-value" id="statProceso">0</div>
    </div>
    <div class="stat-card listo">
      <div class="stat-label">Listas</div>
      <div class="stat-value" id="statListo">0</div>
    </div>
  </div>

  <!-- ── LISTA ── -->
  <div class="list-section">
    <div class="section-label" id="sectionLabel">Todas las tareas</div>
    <div id="taskList"></div>
  </div>

  <!-- ── FAB ── -->
  <button class="fab" id="fabBtn" aria-label="Agregar tarea">
    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
      <path d="M12 5v14M5 12h14"/>
    </svg>
  </button>

  <!-- ── MODAL ── -->
  <div class="overlay" id="overlay">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title" id="modalTitle">Nueva tarea</div>

      <div class="field">
        <label for="fTarea">Tarea</label>
        <input type="text" id="fTarea" placeholder="Nombre de la tarea">
      </div>
      <div class="field">
        <label for="fMateria">Materia</label>
        <input type="text" id="fMateria" placeholder="Ej. POO, Cálculo…">
      </div>
      <div class="field">
        <label for="fInfo">Descripción</label>
        <textarea id="fInfo" placeholder="Detalles de la tarea…"></textarea>
      </div>
      <div class="fields-row">
        <div class="field">
          <label for="fFecha">Entrega</label>
          <input type="date" id="fFecha">
        </div>
        <div class="field">
          <label for="fEstado">Estado</label>
          <select id="fEstado">
            <option value="Pendiente">Pendiente</option>
            <option value="En_Proceso">En proceso</option>
            <option value="Completado">Completado</option>
          </select>
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn-cancel" id="btnCancel">Cancelar</button>
        <button class="btn-save" id="btnSave">Guardar tarea</button>
      </div>
    </div>
  </div>

  <!-- ── TOAST ── -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
